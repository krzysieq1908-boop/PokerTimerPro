<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="white"/>
  <defs>
    <pattern id="qr-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="8" fill="black"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#qr-dots)"/>
  
  <!-- Clear zones for markers -->
  <rect x="10" y="10" width="70" height="70" fill="white"/>
  <rect x="120" y="10" width="70" height="70" fill="white"/>
  <rect x="10" y="120" width="70" height="70" fill="white"/>
  
  <!-- Corner Markers -->
  <rect x="20" y="20" width="50" height="50" rx="10" fill="none" stroke="black" stroke-width="8"/>
  <rect x="35" y="35" width="20" height="20" rx="4" fill="black"/>
  
  <rect x="130" y="20" width="50" height="50" rx="10" fill="none" stroke="black" stroke-width="8"/>
  <rect x="145" y="35" width="20" height="20" rx="4" fill="black"/>
  
  <rect x="20" y="130" width="50" height="50" rx="10" fill="none" stroke="black" stroke-width="8"/>
  <rect x="35" y="145" width="20" height="20" rx="4" fill="black"/>

  <!-- Center Logo Area -->
  <rect x="65" y="65" width="70" height="70" rx="15" fill="#FFDD00" stroke="white" stroke-width="5"/>
  
  <!-- Coffee Cup -->
  <g transform="translate(80, 80) scale(0.8)">
    <path d="M10 15 h30 c0 0 0 30 -15 30 c-15 0 -15 -30 -15 -30 z" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8 15 h34" stroke="black" stroke-width="4" stroke-linecap="round"/>
    <path d="M15 10 h20" stroke="black" stroke-width="4" stroke-linecap="round"/>
    <path d="M40 20 c8 0 8 10 0 10" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
</svg>
