<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0a0a" stroke="url(#grad)" stroke-width="10" />
  
  <!-- Swirl/Timer Effect -->
  <g filter="url(#glow)" stroke="url(#grad)" fill="none" stroke-width="20" stroke-linecap="round">
    <path d="M256 60 A196 196 0 0 1 452 256" opacity="0.8"/>
    <path d="M452 256 A196 196 0 0 1 256 452" opacity="0.6"/>
    <path d="M256 452 A196 196 0 0 1 60 256" opacity="0.4"/>
  </g>

  <!-- Cards -->
  <g transform="translate(160, 140) rotate(-15)" filter="url(#glow)">
    <rect x="0" y="0" width="140" height="200" rx="15" fill="#0a0a0a" stroke="#a855f7" stroke-width="8"/>
    <text x="70" y="130" font-family="Arial" font-size="100" fill="#a855f7" text-anchor="middle">♠</text>
    <text x="20" y="40" font-family="Arial" font-size="30" fill="#a855f7">A</text>
  </g>
  
  <g transform="translate(240, 140) rotate(15)" filter="url(#glow)">
    <rect x="0" y="0" width="140" height="200" rx="15" fill="#0a0a0a" stroke="#6366f1" stroke-width="8"/>
    <text x="70" y="130" font-family="Arial" font-size="100" fill="#6366f1" text-anchor="middle">♥</text>
    <text x="20" y="40" font-family="Arial" font-size="30" fill="#6366f1">K</text>
  </g>

  <!-- Timer Hands -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <circle cx="0" cy="0" r="15" fill="#fff"/>
    <line x1="0" y1="0" x2="0" y2="-120" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="80" y2="80" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
